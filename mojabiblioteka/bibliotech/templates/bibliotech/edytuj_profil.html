{% extends "bibliotech/base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="bg-primary p-4 text-white text-center">
                <h3 class="mb-0 fw-bold">Edycja Profilu</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">IMIĘ</label>
                        <input type="text" name="first_name" class="form-control rounded-pill" value="{{ user.first_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">NAZWISKO</label>
                        <input type="text" name="last_name" class="form-control rounded-pill" value="{{ user.last_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">E-MAIL</label>
                        <input type="email" name="email" class="form-control rounded-pill" value="{{ user.email }}">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Zapisz zmiany</button>
                        <a href="{% url 'moje_konto' %}" class="btn btn-link text-muted text-decoration-none">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
