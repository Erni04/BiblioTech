{% extends "bibliotech/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-success text-white p-4 text-center">
                <h3 class="mb-0"><i class="bi bi-box-arrow-right me-2"></i>Wydanie egzemplarza</h3>
            </div>
            <div class="card-body p-5">
                <div class="alert alert-info border-0 rounded-3 mb-4">
                    <h6 class="fw-bold"><i class="bi bi-book me-2"></i>Książka: {{ egzemplarz.ksiazka.tytul }}</h6>
                    <small>Kod egzemplarza: <strong>{{ egzemplarz.kod_kreskowy }}</strong></small>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Wybierz Czytelnika</label>
                        <select name="czytelnik" class="form-select form-select-lg rounded-3" required>
                            <option value="" disabled selected>Wyszukaj nazwisko...</option>
                            {% for c in czytelnicy %}
                                <option value="{{ c.id }}">{{ c.last_name }} {{ c.first_name }} ({{ c.username }})</option>
                            {% endfor %}
                        </select>
                        <div class="form-text small">Tylko zarejestrowani użytkownicy systemu.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Czas wypożyczenia (dni)</label>
                        <input type="number" name="dni" value="30" min="1" max="365" class="form-control form-control-lg rounded-3">
                        <div class="form-text small">Domyślnie ustawiono 30 dni (1 miesiąc).</div>
                    </div>

                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill shadow">Potwierdź wydanie</button>
                        <a href="{% url 'panel_bibliotekarza' %}" class="btn btn-link text-secondary text-decoration-none">Anuluj i wróć</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
